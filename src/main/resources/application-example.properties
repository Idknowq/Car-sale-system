# ==========================================================
# Database Config (openGauss first)
# Copy this file to application.properties and fill secrets.
# ==========================================================

# Default vendor in current phase
# Supported: opengauss, postgres
db.vendor=opengauss

# openGauss (Huawei Cloud)
db.url=jdbc:opengauss://YOUR_HOST:5432/car_sales
db.username=YOUR_USERNAME
db.password=YOUR_PASSWORD
db.driverClassName=org.opengauss.Driver

# ----------------------------------------------------------
# PostgreSQL fallback interface (reserved for future use)
# To switch:
# 1) set db.vendor=postgres
# 2) change db.url / db.driverClassName
# ----------------------------------------------------------
# db.url=jdbc:postgresql://localhost:5432/car_sales
# db.driverClassName=org.postgresql.Driver

app.menu.locale=zh_CN
